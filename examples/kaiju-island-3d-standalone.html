import * as THREE from 'three';

const rgb31 = c => 'rgb(' + Math.round(c[0]*255/31) + ',' + Math.round(c[1]*255/31) + ',' + Math.round(c[2]*255/31) + ')';

// ---------- terreno: MAPS del GAME.md; áreas sin mapa = layout procedural (frontera dato/código) ----------
function shoreTerrain() {

    for (let c = 0; c < COLS; c++) {

const terrainOf = a => (G.MAPS && G.MAPS[a]) ? G.MAPS[a] : shoreTerrain();
const H = { 17: 1.0, 19: 1.0, 20: 0.25, 50: 0.7 };   // altura 3D por tile sólido

// ---------- escena Three.js ----------
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0e14); scene.fog = new THREE.Fog(0x0a0e14, 14, 30);

const sun = new THREE.DirectionalLight(0xfff2d0, 1.2); sun.position.set(4, 10, 3); scene.add(sun);

    for (const t of (ow.trainers || [])) if (!defeated.has(t.name)) { const s = billboard(humanCanvas((G.TRAINERS[t.name]||{}).pal || 5), .95); s.position.set(t.col, .55, t.row); world.add(s); trainerSprites[t.name] = s; }
    for (const w of (ow.warps || [])) { const m = new THREE.Mesh(new THREE.BoxGeometry(.9,.06,.9), new THREE.MeshBasicMaterial({ color: 0xffd479 })); m.position.set(w.col, .04, w.row); world.add(m); }
  }

}

// ---------- estado de juego ----------
const S = {
  mode: 'world', area: 'field', inside: null, returnTo: null,
  pos: { col: Math.round((G.PLAYER.start.x||16)/8), row: Math.round((G.PLAYER.start.y||64)/8) },
  money: (G.ECONOMY||{}).startMoney || 0, bag: Object.assign({}, G.PLAYER.inventory || {}),
  party: [], battle: null, victory: false,
};
function expandMoves(list){ return (list||[]).map(m => typeof m === 'string' ? Object.assign({name:m}, G.MOVES[m]) : m); }
function makeMon(src, lvl) {
  const base = typeof src === 'string' ? Object.assign({name:src}, G.SPECIES[src]) : src;
  const maxhp = (base.maxhp||20) + Math.max(0, (lvl-5))*2;
  return { name: base.name, type: base.type, lvl, maxhp, hp: maxhp, xp: 0,
           sprite: base.sprite || 'kaiju', moves: expandMoves(base.moves), status: null };
}
S.party.push(makeMon(G.PLAYER.starter, G.PLAYER.level || 5));

const player = billboard(monCanvas(S.party[0].sprite, 0), 1.0); scene.add(player);
function syncPlayer(){ player.position.set(S.pos.col, .6, S.pos.row); }
buildWorld('field'); syncPlayer();

// ---------- HUD ----------
const $ = id => document.getElementById(id);
function msg(t){ $('msg').textContent = t; }
function hud() {
  $('zone').textContent = S.inside ? S.inside : S.area;
  $('money').textContent = S.money + ' ₲';
  $('party').innerHTML = S.party.map(m => `<div class="chip"><b>${m.name}</b> N${m.lvl} · ${m.hp}/${m.maxhp}</div>`).join('');
}
function sfx(name){ try{ const d=(G.SFX||{})[name]; if(!d) return; const A = sfx.ctx || (sfx.ctx = new AudioContext());
  const o=A.createOscillator(), g=A.createGain(); o.type='square'; o.frequency.value=d.freq; g.gain.value=.04;
  o.connect(g); g.connect(A.destination); o.start(); o.stop(A.currentTime + d.dur); }catch(e){} }

// ---------- movimiento, warps, encuentros, vista de entrenadores ----------
const cell = (c, r) => (terrain.tilemap[r] || [])[c];
function solid(c, r){ const t = cell(c, r); return t == null || SOLID.has(t); }
function enterInterior(name, entry, from) {
  S.inside = name; S.returnTo = from; buildWorld('__interior__'); // interiores: sin overworld
  terrain = G.MAPS[name]; buildWorld2Interior(name);
  S.pos = { col: entry.col, row: entry.row }; syncPlayer(); hud(); msg('Entras en: ' + name);
}
function buildWorld2Interior(name){ // reusa buildWorld sobre el mapa interior
  if (world) scene.remove(world);
  world = new THREE.Group(); terrain = G.MAPS[name];
  const tm = terrain.tilemap, at = terrain.attrs;
  for (let r = 0; r < tm.length; r++) for (let c = 0; c < tm[0].length; c++) {
    const id = tm[r][c], p = at[r][c], mat = new THREE.MeshLambertMaterial({ map: tileTex(id, p) });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(1,1), mat); floor.rotation.x = -Math.PI/2; floor.position.set(c,0,r); world.add(floor);
    if (SOLID.has(id)) { const h = H[id] || .9, box = new THREE.Mesh(new THREE.BoxGeometry(1,h,1), mat); box.position.set(c,h/2,r); world.add(box); }
  }
  scene.add(world);
}
function leaveInterior() {
  const back = S.returnTo, ret = (G.MAPS[S.inside]||{}).return || { col: 1, row: 1 };
  S.inside = null; S.area = back; buildWorld(back);
  S.pos = { col: ret.col, row: ret.row }; syncPlayer(); hud(); msg('Vuelves a: ' + back);
}
function tryTrainerSight() {
  const ow = (G.OVERWORLD||{})[S.area]; if (!ow || S.inside) return;
  for (const t of (ow.trainers || [])) {
    if (defeated.has(t.name)) continue;
    const dc = S.pos.col - t.col, dr = S.pos.row - t.row, sight = t.sight || 3;
    if (!((dc === 0 && Math.abs(dr) <= sight) || (dr === 0 && Math.abs(dc) <= sight))) continue;
    const steps = Math.max(Math.abs(dc), Math.abs(dr)); let blocked = false;
    for (let i = 1; i < steps; i++) { const cc = t.col + Math.sign(dc)*i*(dr===0?1:0)+ (dr===0?0:0), rr = t.row + Math.sign(dr)*i*(dc===0?1:0);
      if (solid(dr===0 ? t.col + Math.sign(dc)*i : t.col, dc===0 ? t.row + Math.sign(dr)*i : t.row)) { blocked = true; break; } }
    if (blocked) continue;
    const def = G.TRAINERS[t.name] || {};
    msg(t.name + ': "' + (def.dialogue || '...') + '"'); sfx('encounter');
    startBattle((def.team || []).map(m => makeMon(m, def.level || m.level || 5)), { trainer: t.name, prize: def.prize || 0 });

}
function move(dc, dr) {
  if (S.mode !== 'world' || S.victory) return;
  const nc = S.pos.col + dc, nr = S.pos.row + dr;
  const ow = (G.OVERWORLD||{})[S.area];
  if (!S.inside && ow) { const w = (ow.warps||[]).find(w => w.col === nc && w.row === nr);
    if (w) { if (G.MAPS && G.MAPS[w.target]) enterInterior(w.target, w.entry || {col:1,row:1}, S.area);
             else { S.area = w.target; buildWorld(w.target); S.pos = { col: 1, row: Math.floor(ROWS/2) }; syncPlayer(); hud(); msg('Llegas a: ' + w.target); }
             return; } }
  // NPCs y entrenadores bloquean la celda (se les habla con Espacio, no se les pisa)
  const occupied = !S.inside && ow &&
    ((ow.npcs || []).some(n => n.col === nc && n.row === nr) ||
     (ow.trainers || []).some(t => !defeated.has(t.name) && t.col === nc && t.row === nr));
  if (occupied || solid(nc, nr)) return;
  S.pos = { col: nc, row: nr }; syncPlayer();
  if (S.inside) { const ex = (G.MAPS[S.inside]||{}).exit; if (ex && ex.col === nc && ex.row === nr) { leaveInterior(); return; } }
  if (tryTrainerSight()) return;
  const t = cell(nc, nr);
  if (TILES[String(t)] && TILES[String(t)].encounter && Math.random() < (BAL.encounterRate || .15)) {
    const pool = (G.ENCOUNTERS||{})[S.area] || []; if (pool.length) {
      const pick = pool[Math.floor(Math.random()*pool.length)];
      const lvl = Math.max(2, S.party[0].lvl + (Math.floor(Math.random()*3)-1));
      sfx('encounter'); msg('¡Un ' + pick.name + ' salvaje!');
      startBattle([makeMon(pick, lvl)], { wild: true });
    }

}
function talk() {
  if (S.mode !== 'world' || S.inside) return;
  const ow = (G.OVERWORLD||{})[S.area]; if (!ow) return;
  for (const { n } of ((ow.npcs||[]).map(n => ({ n })))) if (Math.abs(n.col-S.pos.col)+Math.abs(n.row-S.pos.row) === 1) { msg(n.dialogue || '...'); return; }
}

// ---------- combate por turnos (TYPE_CHART, efectos, captura, huida, XP/evolución del GAME.md) ----------
function mult(a, d){ const r = ((G.TYPE_CHART||{})[a]||{})[d]; return r == null ? 1 : r; }
function bar(m){ return `<span class="bar"><i style="width:${Math.max(0,100*m.hp/m.maxhp)}%"></i></span>`; }
function bpaint() {
  const B = S.battle;
  $('bfoe').innerHTML = `<b>${B.foe.name}</b> N${B.foe.lvl} ${B.foe.status ? '['+B.foe.status+']' : ''} ${bar(B.foe)} ${B.foe.hp}/${B.foe.maxhp}`;
  $('bmine').innerHTML = `<b>${B.mine.name}</b> N${B.mine.lvl} ${B.mine.status ? '['+B.mine.status+']' : ''} ${bar(B.mine)} ${B.mine.hp}/${B.mine.maxhp}`;
  $('bmenu').innerHTML = B.sub === 'moves'
    ? B.mine.moves.map((m,i)=>`<b>${i+1}</b> ${m.name} (${m.type}·${m.power||0})`).join(' · ') + ' · <b>0</b> volver'
    : B.sub === 'bag'
    ? Object.entries(S.bag).filter(([,q])=>q>0).map(([it,q],i)=>`<b>${i+1}</b> ${it}×${q}`).join(' · ') + ' · <b>0</b> volver'
    : `<b>1</b> Luchar · <b>2</b> Mochila · <b>3</b> Huir`;
}
function blog(t){ const l = $('blog'); l.innerHTML = (l.innerHTML + '<br>' + t).split('<br>').slice(-3).join('<br>'); }
function startBattle(queue, meta) {
  S.mode = 'battle';
  S.battle = { queue, meta, foe: queue.shift(), mine: S.party.find(m=>m.hp>0), sub: 'menu', foeSkip: false };
  $('battle').classList.add('on'); $('blog').innerHTML = ''; bpaint();
}
function endBattle(text) {
  $('battle').classList.remove('on'); S.battle = null; S.mode = 'world'; hud(); if (text) msg(text);
}
function statusTick(m){ if (m.status === 'burn') { m.hp = Math.max(0, m.hp - 1); } }
function foeTurn() {
  const B = S.battle; if (!B || B.foe.hp <= 0) return;
  if (B.foeSkip) { B.foeSkip = false; blog(B.foe.name + ' no puede moverse.'); }
  else if (B.foe.status === 'paralyze' && Math.random() < .4) blog(B.foe.name + ' está paralizado.');
  else {
    const mv = B.foe.moves[Math.floor(Math.random()*B.foe.moves.length)] || { name:'Placaje', power:4, type:'NORMAL' };
    let d = Math.max(1, Math.round((mv.power||4) * mult(mv.type, B.mine.type) * (.9+.2*Math.random())));
    if (B.foe.status === 'slow') d = Math.max(1, Math.round(d*.8));
    B.mine.hp = Math.max(0, B.mine.hp - d); sfx('hit');
    blog(B.foe.name + ' usa ' + mv.name + ': -' + d);
    if (mv.effect && Math.random() < (mv.chance||0)) applyEffect(mv, B.foe, B.mine);
  }
  statusTick(B.mine); statusTick(B.foe);
  if (B.mine.hp <= 0) { sfx('faint'); blog(B.mine.name + ' cae.');
    const next = S.party.find(m=>m.hp>0);
    if (next) { B.mine = next; blog('¡Adelante, ' + next.name + '!'); }
    else { for (const m of S.party) { m.hp = m.maxhp; m.status = null; }
           S.area='field'; S.inside=null; buildWorld('field');
           S.pos={col:Math.round((G.PLAYER.start.x||16)/8), row:Math.round((G.PLAYER.start.y||64)/8)}; syncPlayer();

  bpaint();
}
function applyEffect(mv, from, to) {
  if (mv.effect === 'leech') { const heal = Math.max(1, Math.round((mv.power||4)/2)); from.hp = Math.min(from.maxhp, from.hp + heal); blog(from.name + ' drena ' + heal + ' PS.'); }
  else if (mv.effect === 'flinch') { if (to === S.battle.foe) S.battle.foeSkip = true; blog(to.name + ' retrocede.'); }
  else if (['burn','paralyze','slow'].includes(mv.effect) && !to.status) { to.status = mv.effect; blog(to.name + ' sufre ' + mv.effect + '.'); }
}
function gainXP(winner, foe) {
  winner.xp += 6 + Math.round(foe.maxhp/2) + foe.lvl;
  let need = Math.round(winner.lvl * 10 * (BAL.xpCurveMul || 1));
  while (winner.xp >= need) { winner.xp -= need; winner.lvl++; winner.maxhp += 3; winner.hp = Math.min(winner.maxhp, winner.hp+3);
    sfx('levelup'); blog(winner.name + ' sube a N' + winner.lvl + '!');
    const evo = (G.EVOLUTIONS||{})[winner.name];
    if (evo && winner.lvl >= (evo.level || 99)) { blog('¡' + winner.name + ' evoluciona a ' + evo.into + '!');
      winner.name = evo.into; winner.type = evo.type || winner.type; winner.maxhp = (evo.maxhp||winner.maxhp) + (winner.lvl-5)*2;
      winner.hp = winner.maxhp; winner.moves = expandMoves((evo.moves||winner.moves).map(m=>m.name||m)); }
    need = Math.round(winner.lvl * 10 * (BAL.xpCurveMul || 1)); }
}
function foeDown() {
  const B = S.battle; sfx('win'); blog(B.foe.name + ' es derrotado.'); gainXP(B.mine, B.foe); hud();
  if (B.queue.length) { B.foe = B.queue.shift(); blog((B.meta.trainer||'') + ' envía a ' + B.foe.name + '.'); bpaint(); return; }
  if (B.meta.trainer) { S.money += B.meta.prize||0; defeated.add(B.meta.trainer);
    const beatChampion = /CHAMPION/i.test(B.meta.trainer);
    endBattle('Vences a ' + B.meta.trainer + ' (+' + (B.meta.prize||0) + ' ₲).');
    if (beatChampion) { S.victory = true; $('overlay').classList.add('on');
      $('overlay').innerHTML = '<div>🏆 ' + (TEXTS.victory || '¡Has vencido!') + '</div><div style="font-size:13px;color:#7b8696">Kaiju Island · juego 100% definido en GAME.md · motor Three.js</div>'; }
    return; }
  endBattle(TEXTS.victory ? '' : 'Victoria.'); if (TEXTS.victory) msg('Victoria salvaje. Sigue explorando.');
}
function act(k) {
  const B = S.battle; if (!B) return;
  if (B.sub === 'menu') {
    if (k === '1') { B.sub = 'moves'; bpaint(); return; }
    if (k === '2') { B.sub = 'bag'; bpaint(); return; }
    if (k === '3') { if (!B.meta.wild) { blog('¡No puedes huir de un duelo!'); foeTurn(); return; }
      if (Math.random() < (BAL.runChance || .5)) { endBattle('Escapas sin problemas.'); return; }
      blog('¡No logras escapar!'); foeTurn(); return; }
    return;
  }
  if (k === '0') { B.sub = 'menu'; bpaint(); return; }

    let d = Math.max(1, Math.round((mv.power||4) * mult(mv.type, B.foe.type) * (.9+.2*Math.random()) * (1 + .03*(B.mine.lvl - B.foe.lvl))));
    if (B.mine.status === 'slow') d = Math.max(1, Math.round(d*.8));
    const m2 = mult(mv.type, B.foe.type);
    B.foe.hp = Math.max(0, B.foe.hp - d); sfx(m2 > 1 ? 'crit' : 'hit');
    blog(B.mine.name + ' usa ' + mv.name + ': -' + d + (m2>1 ? ' ¡Es súper eficaz!' : m2<1 ? ' No es muy eficaz...' : ''));
    if (mv.effect && Math.random() < (mv.chance||0)) applyEffect(mv, B.mine, B.foe);
    if (B.foe.hp <= 0) { foeDown(); return; }
    foeTurn(); return;
  }
  if (B.sub === 'bag') {
    const items = Object.entries(S.bag).filter(([,q])=>q>0); const [it] = items[i] || []; if (!it) return; B.sub = 'menu';
    const def = (G.ITEMS||{})[it] || {};
    if (def.effect === 'heal') { S.bag[it]--; B.mine.hp = Math.min(B.mine.maxhp, B.mine.hp + (def.amount||10)); blog(it + ': +' + (def.amount||10) + ' PS.'); }
    else if (def.effect === 'cure') { S.bag[it]--; B.mine.status = null; blog(it + ': estado curado.'); }
    else if (def.effect === 'catch') {
      if (!B.meta.wild) { blog('¡No puedes capturar el kaiju de otro entrenador!'); foeTurn(); bpaint(); return; }
      S.bag[it]--;
      const p = (BAL.catchBase||.3) + (BAL.catchScale||.5) * (1 - B.foe.hp/B.foe.maxhp) + (it === 'STORM_BALL' ? .15 : 0);
      if (Math.random() < p) { sfx('catch'); B.foe.status = null;
        if (S.party.length < 6) { S.party.push(B.foe); endBattle('¡' + B.foe.name + ' capturado! Se une al equipo.'); }
        else endBattle('¡' + B.foe.name + ' capturado! (equipo lleno)');
        hud(); return; }
      blog('¡' + B.foe.name + ' se libera!');
    }
    foeTurn(); bpaint(); return;
  }
}

// ---------- input + bucle ----------
addEventListener('keydown', e => {
  if (S.victory) return;
  if (S.mode === 'battle') { act(e.key); e.preventDefault(); return; }
  if (e.key === 'ArrowLeft') move(-1, 0); else if (e.key === 'ArrowRight') move(1, 0);
  else if (e.key === 'ArrowUp') move(0, -1); else if (e.key === 'ArrowDown') move(0, 1);
  else if (e.key === ' ') talk(); else return;
  e.preventDefault();
});
msg(TEXTS.intro || 'Kaiju Island'); hud();
(function loop(){ requestAnimationFrame(loop);
  const tx = S.pos.col, tz = S.pos.row;
  cam.position.lerp(new THREE.Vector3(tx, 7.5, tz + 7), .12);
  cam.lookAt(player.position.x, .5, player.position.z);
  ren.render(scene, cam);
})();

// superficie de verificación (harness/tests): estado observable del motor
window.KAIJU = { S, G, defeated };
</script>
